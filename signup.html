<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="container mt-5">

    <h2 class="mb-4">Signup</h2>

    <div class="col-md-4">
        <input id="username" class="form-control mb-2" placeholder="Username">
        <input id="email" class="form-control mb-2" placeholder="Email">
        <input id="password" type="password" class="form-control mb-2" placeholder="Password">

        <button id="signupBtn" class="btn btn-primary w-100">Register</button>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- JS -->
    <script src="js/signup.js"></script>

</body>
</html>
